<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Section - Clothing Ecommerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
            color: #333;
            line-height: 1.6;
        }

        .kids-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 600;
            color: #1e40af;
            margin-bottom: 50px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        .category-card {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        .category-image {
            position: relative;
            width: 100%;
            height: 250px;
            overflow: hidden;
        }

        .category-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .category-card:hover .category-image img {
            transform: scale(1.05);
        }

        .category-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(173, 216, 230, 0.4);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .category-card:hover .category-overlay {
            opacity: 1;
        }

        .category-content {
            padding: 20px;
            text-align: center;
        }

        .category-title {
            font-size: 1.25rem;
            font-weight: 500;
            color: #1e40af;
            margin-bottom: 10px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .category-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }

            .section-title {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .category-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .section-title {
                font-size: 1.75rem;
            }

            .kids-section {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <section class="kids-section">
        <h2 class="section-title">Shop By Category</h2>
        <div class="category-grid">
            <div class="category-card">
                <div class="category-image">
                    <img src="https://images.unsplash.com/photo-1516627145497-ae6968895b74" alt="All Kids">
                    <div class="category-overlay"></div>
                </div>
                <div class="category-content">
                    <h3 class="category-title">All Kids</h3>
                </div>
            </div>
            <div class="category-card">
                <div class="category-image">
                    <img src="https://images.unsplash.com/photo-1503454537195-1dcabb73ffb9" alt="Girls">
                    <div class="category-overlay"></div>
                </div>
                <div class="category-content">
                    <h3 class="category-title">Girls</h3>
                </div>
            </div>
            <div class="category-card">
                <div class="category-image">
                    <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab" alt="Boys">
                    <div class="category-overlay"></div>
                </div>
                <div class="category-content">
                    <h3 class="category-title">Boys</h3>
                </div>
            </div>
            <div class="category-card">
                <div class="category-image">
                    <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba" alt="Baby">
                    <div class="category-overlay"></div>
                </div>
                <div class="category-content">
                    <h3 class="category-title">Baby</h3>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
